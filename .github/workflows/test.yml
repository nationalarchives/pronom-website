name: Test

on:
  push:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test changed files
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      - run: |
          (cd terraform && terraform fmt -check --recursive)
          docker compose up --detach --wait --wait-timeout 120
          docker compose exec app poetry run python .github/scripts/generate_index_file.py /home/app/pronom-signatures
          cd tests
          npm --ignore-scripts ci
          npx cypress install
          npx cypress run
          cd ..
          docker compose exec app poetry run python -m unittest discover -v -s lambdas/test
        env:
          GITHUB_TOKEN: ${{ github.token }}

  check-formatting:
    runs-on: ubuntu-latest
    name: Check formatting
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - run: docker run --rm -v "$(pwd)":/app/ ghcr.io/nationalarchives/tna-python-dev:preview checkformat
