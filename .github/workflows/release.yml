name: Release

concurrency:
  group: release
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches:
      - test-the-test-environment
permissions:
  id-token: write
  contents: read
jobs: 
  release-test:
    runs-on: ubuntu-latest
    name: Release test
    environment:
      name: test
    
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          repository: nationalarchives/pronom-signatures
          path: "signature-files"
          persist-credentials: false
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_wrapper: false
      - name: Configure AWS credentials for Lambda
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 #v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/PRONOMInfrastructureRole
          aws-region: eu-west-2
          role-session-name: DeployPRONOMTest
      - run: .github/scripts/release.sh test
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ACCOUNT_NUMBER: ${{ secrets.ACCOUNT_ID }}
          REGION: eu-west-2
          
  e2e-tests:
    needs: release-test
    runs-on: ubuntu-latest
    name: Run end-to-end tests against test environment
    environment:
      name: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Cypress dependencies
        run: |
          cd tests
          npm ci
          npx cypress install
      - name: Run Cypress tests
        run: |
          cd tests
          npx cypress run --config baseUrl=https://test.pronom.nationalarchives.gov.uk

  destroy-test:
    needs: e2e-tests
    if: always()
    runs-on: ubuntu-latest
    name: Destroy test environment
    environment:
      name: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_wrapper: false
      - name: Configure AWS credentials for Lambda
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 #v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/PRONOMInfrastructureRole
          aws-region: eu-west-2
          role-session-name: DestroyPRONOMTest
      - name: Destroy test Terraform infrastructure
        run: |
          cd terraform
          terraform init
          terraform workspace select test
          LATEST_SIGNATURE_FILE=$(gh api repos/nationalarchives/pronom/releases/latest | jq -r '.name') terraform destroy --auto-approve
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TF_VAR_environment: test

