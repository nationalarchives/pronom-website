name: Release

concurrency:
  group: release
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    name: Release
    environment:
      name: production
      url: https://pronom.nationalarchives.gov.uk/
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          repository: nationalarchives/pronom-signatures
          path: "signature-files"
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - name: Configure AWS credentials for Lambda
        uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5 #v6.1.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/ProdPRONOMInfrastructureRole
          aws-region: eu-west-2
          role-session-name: DeployPRONOM
      - run: .github/scripts/release.sh prod
        env:
          ACCOUNT_NUMBER: ${{ secrets.ACCOUNT_ID }}
          REGION: eu-west-2
          GITHUB_TOKEN: ${{ github.token }}
