services:
  nginx:
    build:
      context: .
      secrets:
        - github_token
      dockerfile: Dockerfile.nginx
    ports:
      - 8081:80
    volumes:
      - ./nginx:/etc/nginx/conf.d
    restart: unless-stopped
    depends_on:
      - app
  app:
    build:
      context: .
      dockerfile: Dockerfile.flask
    environment:
      - DB_NAME=/home/app/indexes
    volumes:
      - ./:/app
    restart: unless-stopped
secrets:
  github_token:
    environment: GITHUB_TOKEN
